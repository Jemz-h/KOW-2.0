name: kow
description: "Karunungan On Wheels"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/grade_select/
    - assets/icons/
    - assets/images/
    - assets/misc/
    - assets/settings/
    - assets/sisa_oyo/
    - assets/themes/

  fonts:
    - family: SuperCartoon
      fonts:
        - asset: assets/fonts/supercartoon.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/sisa_oyo/kow_app_icon.png
  remove_alpha_ios: true